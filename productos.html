const params = new URLSearchParams(window.location.search);
const tipo = params.get("tipo");
const nombreIndex = params.get("nombre");

let total = 0;

if (tipo && nombreIndex !== null) {

    let seleccion = datos[tipo][nombreIndex];
    let contenedor = document.getElementById("productos");

    seleccion.figuras.forEach((figura, i) => {

        let card = document.createElement("div");
        card.classList.add("card");

        card.innerHTML = `
            <h3>${figura.nombre}</h3>
            <img src="${figura.img}">
            <p>¿Cuántas figuras quieres?</p>

            <div class="contador">
                <button onclick="restar(${i})">-</button>
                <input id="cant-${i}" type="text" value="">
                <button onclick="sumar(${i})">+</button>
            </div>

            <button onclick="agregar(${i})">Agregar al carrito</button>
        `;

        contenedor.appendChild(card);
    });
}

// ➕ SUMAR
function sumar(i) {
    let input = document.getElementById(`cant-${i}`);
    let val = parseInt(input.value) || 0;
    input.value = val + 1;
}

// ➖ RESTAR
function restar(i) {
    let input = document.getElementById(`cant-${i}`);
    let val = parseInt(input.value) || 0;
    if (val > 0) input.value = val - 1;
}

function agregar(i) {

    let cantidad = parseInt(document.getElementById(`cant-${i}`).value);

    if (!cantidad || cantidad <= 0) {
        alert("Ingresa una cantidad válida");
        return;
    }

    let seleccion = datos[tipo][nombreIndex];
    let figura = seleccion.figuras[i];

    let carrito = JSON.parse(localStorage.getItem("carritoFiguras")) || [];

    let existente = carrito.find(item => item.nombre === figura.nombre);

    if (existente) {
        existente.cantidad += cantidad;
    } else {

        carrito.push({
            nombre: figura.nombre,
            img: figura.img,
            cantidad: cantidad
        });
    }


    localStorage.setItem("carritoFiguras", JSON.stringify(carrito));

    total += cantidad;

    localStorage.setItem("carrito", total);

    document.getElementById("cartCount").textContent = total;
}
let carritoGuardado = localStorage.getItem("carrito");

if (carritoGuardado) {
    total = parseInt(carritoGuardado);
    document.getElementById("cartCount").textContent = total;
}
function volver(){
    window.location.href="index.html";
}

</script>
